<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- PWA & Mobile Meta Tags -->
  <meta name="theme-color" content="#18222d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IT Studio Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tg: {
              bg: '#18222d',
              card: '#222e3a',
              text: '#ffffff',
              hint: '#8b9bb4',
              primary: '#2ea6ff',
              primaryHover: '#268ee0',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-tg-bg text-tg-text min-h-screen font-sans selection:bg-tg-primary/30 antialiased pb-20">
  
  <!-- Header -->
  <header class="sticky top-0 z-40 bg-tg-bg/80 backdrop-blur-md border-b border-white/5 px-4 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-tg-primary to-purple-500 flex items-center justify-center shadow-lg shadow-tg-primary/20">
        <i class="fa-solid fa-code text-white text-lg"></i>
      </div>
      <h1 class="text-xl font-bold tracking-tight" data-i18n="app.title">IT Studio</h1>
    </div>
    <button id="cartBtn" class="relative p-2 text-tg-text hover:text-tg-primary transition-colors">
      <i class="fa-solid fa-cart-shopping text-xl"></i>
      <span id="cartBadge" class="absolute top-0 right-0 w-5 h-5 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center transform scale-0 transition-transform">0</span>
    </button>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">
    <!-- Hero / Banner -->
    <div class="mb-8 rounded-2xl bg-gradient-to-br from-tg-card to-tg-bg border border-white/5 p-6 shadow-xl relative overflow-hidden">
      <div class="absolute top-0 right-0 w-64 h-64 bg-tg-primary/10 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>
      <h2 class="text-3xl font-extrabold mb-2" data-i18n="app.welcome">Welcome!</h2>
      <p class="text-tg-hint text-sm max-w-md" data-i18n="app.subtitle">Select a service for your business.</p>
    </div>

    <!-- Products Grid -->
    <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- Generated by JS -->
    </div>
  </main>

  <!-- Cart Modal Overlay -->
  <div id="cartModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex flex-col justify-end opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-tg-card rounded-t-3xl border-t border-white/10 p-6 shadow-2xl transform translate-y-full transition-transform duration-300 w-full max-w-4xl mx-auto h-[80vh] flex flex-col">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold" data-i18n="app.cart">Cart</h2>
        <button id="closeCartBtn" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors">
          <i class="fa-solid fa-xmark text-tg-hint"></i>
        </button>
      </div>
      
      <div id="cartItems" class="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar">
        <!-- Cart items go here -->
      </div>
      
      <div class="mt-6 pt-6 border-t border-white/10">
        <div class="flex justify-between items-center mb-6">
          <span class="text-tg-hint text-lg" data-i18n="app.total">Total</span>
          <span id="cartTotal" class="text-2xl font-bold text-white">$0</span>
        </div>
        <button id="checkoutBtn" class="w-full bg-tg-primary hover:bg-tg-primaryHover text-white font-bold py-4 rounded-xl shadow-lg shadow-tg-primary/25 transition-all transform active:scale-[0.98]" data-i18n="app.checkout">
          Checkout
        </button>
      </div>
    </div>
  </div>

  <!-- Notification Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-full shadow-lg font-medium opacity-0 transform translate-y-4 pointer-events-none transition-all duration-300 z-50">
    Notification
  </div>

  <script src="main.js"></script>
</body>
    </html>
